# Deploy a release tag — Convex, web, and marketing (lane encoded in tag name).
#
# USAGE: Actions → Deploy → tag [dev|prod]-yyyy-MM-dd-HH-mm-ss (UTC)
#        or workflow_call from release.yml
#
# dev-* → repository secrets; prod-* → GitHub production environment
# SECRETS: see docs/environments.md

name: Deploy

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag [dev|prod]-yyyy-MM-dd-HH-mm-ss (UTC)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag [dev|prod]-yyyy-MM-dd-HH-mm-ss (UTC)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse-release:
    runs-on: ubuntu-latest
    outputs:
      stamp: ${{ steps.parse.outputs.stamp }}
      tag: ${{ steps.parse.outputs.tag }}
      pre_release: ${{ steps.parse.outputs.pre_release }}
      deploy_lane: ${{ steps.parse.outputs.deploy_lane }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.event.inputs.tag }}"
          echo "Parsing tag: $TAG"
          if [[ "$TAG" =~ ^dev-([0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2})$ ]]; then
            echo "stamp=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "pre_release=true" >> "$GITHUB_OUTPUT"
            echo "deploy_lane=dev" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^prod-([0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2})$ ]]; then
            echo "stamp=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "pre_release=false" >> "$GITHUB_OUTPUT"
            echo "deploy_lane=prod" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Invalid tag. Expected [dev|prod]-yyyy-MM-dd-HH-mm-ss (UTC)"
            exit 1
          fi

  deploy-convex:
    needs: parse-release
    runs-on: ubuntu-latest
    environment: ${{ needs.parse-release.outputs.pre_release == 'false' && 'production' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: ./.github/actions/setup-bun
      - name: Deploy Convex
        uses: ./.github/actions/deploy-convex
        with:
          convex_deploy_key: ${{ secrets.CONVEX_DEPLOY_KEY }}

  deploy-web:
    needs: [parse-release, deploy-convex]
    runs-on: ubuntu-latest
    environment: ${{ needs.parse-release.outputs.pre_release == 'false' && 'production' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: ./.github/actions/setup-bun
      - name: Deploy web
        uses: ./.github/actions/deploy-web-vercel
        with:
          convex_deploy_key: ${{ secrets.CONVEX_DEPLOY_KEY }}
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          vite_convex_url: ${{ secrets.VITE_CONVEX_URL }}
          vite_clerk_publishable_key: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          vercel_pull_environment: ${{ needs.parse-release.outputs.pre_release == 'true' && 'preview' || 'production' }}
          vercel_prod_flag: ${{ needs.parse-release.outputs.pre_release == 'false' && 'true' || 'false' }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build-${{ needs.parse-release.outputs.stamp }}-${{ needs.parse-release.outputs.deploy_lane }}
          path: apps/web/dist/
          retention-days: 30

  deploy-marketing:
    needs: [parse-release, deploy-convex]
    runs-on: ubuntu-latest
    environment: ${{ needs.parse-release.outputs.pre_release == 'false' && 'production' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: ./.github/actions/setup-bun
      - name: Deploy marketing
        uses: ./.github/actions/deploy-marketing-vercel
        with:
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
          vercel_pull_environment: ${{ needs.parse-release.outputs.pre_release == 'true' && 'preview' || 'production' }}
          vercel_prod_flag: ${{ needs.parse-release.outputs.pre_release == 'false' && 'true' || 'false' }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: marketing-build-${{ needs.parse-release.outputs.stamp }}-${{ needs.parse-release.outputs.deploy_lane }}
          path: apps/marketing/dist/
          retention-days: 30
