name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  GITLEAKS_VERSION: "8.30.1"
  CONVEX_CI_TESTS: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      marketing: ${{ steps.detect.outputs.marketing }}
      convex: ${{ steps.detect.outputs.convex }}
      shared: ${{ steps.detect.outputs.shared }}
      config: ${{ steps.detect.outputs.config }}
      any: ${{ steps.detect.outputs.any }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      convex_ci_tests: ${{ steps.ci-flags.outputs.convex_ci_tests }}
    steps:
      - id: ci-flags
        run: echo "convex_ci_tests=${{ env.CONVEX_CI_TESTS }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "")
          elif [ "${{ github.event_name }}" = "push" ]; then
            export CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          bash scripts/ci-detect-changes.sh

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run security audit
        run: bun audit --audit-level=high

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.before }}..${{ github.event.after }}"
          else
            gitleaks detect --source . --redact --verbose
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Lint
        run: bun run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.any == 'true' ||
      needs.detect-changes.outputs.docs_only == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Format check
        run: bun run format

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Codegen and typecheck
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run typecheck
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping monorepo typecheck — CONVEX_DEPLOY_KEY not configured."
            echo "After fork: bun run dev:convex"
          fi

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate and build web app
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VITE_CONVEX_URL: https://ci-placeholder.convex.cloud
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run --filter @repo/web build
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping web build — CONVEX_DEPLOY_KEY not configured."
          fi

  build-marketing:
    name: Build Marketing
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build marketing site
        run: bun run --filter @repo/marketing build

  tests-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck, build-web]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run web tests
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run --filter @repo/web test
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping @repo/web unit tests — CONVEX_DEPLOY_KEY not configured."
          fi
          bun run --filter @repo/ui-web test
          bun run --filter @repo/utils test
          bun run --filter @repo/utils test:integration

  tests-packages:
    name: Package Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format]
    if: |
      needs.detect-changes.outputs.shared == 'true' ||
      needs.detect-changes.outputs.config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run shared package tests
        run: bun run --filter @repo/config test && bun run --filter @repo/env-core test

  tests-marketing:
    name: Marketing Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck, build-marketing]
    if: needs.detect-changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run marketing tests
        run: bun run --filter @repo/marketing test

  storybook-ui-web:
    name: Storybook (ui-web)
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build Storybook
        run: bun run --filter @repo/ui-web build-storybook

  coverage-ui-web:
    name: Coverage (ui-web)
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-web]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run ui-web coverage
        run: bun run --filter @repo/ui-web test:coverage

  tests-convex:
    name: Convex Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.convex == 'true' && needs.detect-changes.outputs.convex_ci_tests == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Convex tests
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            if [ "${{ vars.CI_STRICT }}" = "1" ]; then
              echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
              exit 1
            fi
            echo "::notice::Skipping Convex tests — CONVEX_DEPLOY_KEY not configured."
            exit 0
          fi
          bun scripts/generate-convex.ts
          bun run --filter @repo/convex test

  web-e2e-smoke:
    name: Web E2E smoke
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-web]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Report E2E smoke configuration
        id: e2e-smoke-config
        run: |
          missing=()
          [ -z "${{ secrets.CLERK_SECRET_KEY }}" ] && missing+=("CLERK_SECRET_KEY")
          [ -z "${{ secrets.E2E_CLERK_USER_EMAIL }}" ] && missing+=("E2E_CLERK_USER_EMAIL")
          [ -z "${{ secrets.VITE_CONVEX_URL }}" ] && missing+=("VITE_CONVEX_URL")
          [ -z "${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" ] && missing+=("VITE_CLERK_PUBLISHABLE_KEY")
          if [ ${#missing[@]} -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "E2E smoke: secrets configured — running authenticated tests"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E smoke skipped — missing GitHub Actions secrets: ${missing[*]}"
            echo "See docs/ci-cd.md#github-actions-secrets"
            if [ "${{ vars.E2E_SMOKE_REQUIRE_SECRETS }}" = "1" ]; then
              echo "::error::E2E_SMOKE_REQUIRE_SECRETS=1 but smoke secrets are missing."
              exit 1
            fi
          fi
      - name: Codegen, install browsers, and run Playwright smoke (tasks)
        if: steps.e2e-smoke-config.outputs.configured == 'true'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          E2E_SMOKE_REQUIRE_SECRETS: ${{ vars.E2E_SMOKE_REQUIRE_SECRETS }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::E2E smoke requires CONVEX_DEPLOY_KEY for convex/_generated (Vite imports @convex/api)."
            exit 1
          fi
          bun scripts/generate-convex.ts
          bunx playwright install chromium
          bun run --filter @repo/web e2e:smoke
      - name: Upload Playwright smoke report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web-smoke
          path: apps/web/playwright-report-smoke/
          retention-days: 7

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-web]
    if: |
      needs.detect-changes.outputs.web == 'true' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Codegen, install browsers, and run Playwright (web)
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bunx playwright install chromium
            bun run --filter @repo/web e2e
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping web E2E — CONVEX_DEPLOY_KEY not configured (required for @convex/api)."
          fi
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web
          path: apps/web/playwright-report/
          retention-days: 7

  marketing-e2e:
    name: Marketing E2E
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-marketing]
    if: |
      needs.detect-changes.outputs.marketing == 'true' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Playwright browsers
        run: bunx playwright install chromium
      - name: Run Playwright tests (marketing)
        run: bun run --filter @repo/marketing e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-marketing
          path: apps/marketing/playwright-report/
          retention-days: 7

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - security-audit
      - secrets-scan
      - lint
      - format
      - typecheck
      - build-web
      - build-marketing
      - tests-web
      - tests-marketing
      - tests-packages
      - tests-convex
      - storybook-ui-web
      - coverage-ui-web
      - web-e2e-smoke
      - web-e2e
    if: always() && !cancelled() && needs.detect-changes.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Verify required jobs
        env:
          GITHUB_REF: ${{ github.ref }}
          ANY: ${{ needs.detect-changes.outputs.any }}
          WEB: ${{ needs.detect-changes.outputs.web }}
          MARKETING: ${{ needs.detect-changes.outputs.marketing }}
          CONVEX: ${{ needs.detect-changes.outputs.convex }}
          SHARED: ${{ needs.detect-changes.outputs.shared }}
          CONFIG: ${{ needs.detect-changes.outputs.config }}
          DOCS_ONLY: ${{ needs.detect-changes.outputs.docs_only }}
          CONVEX_CI_TESTS: ${{ needs.detect-changes.outputs.convex_ci_tests }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
          SECRETS_SCAN_RESULT: ${{ needs.secrets-scan.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          FORMAT_RESULT: ${{ needs.format.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          BUILD_MARKETING_RESULT: ${{ needs.build-marketing.result }}
          TESTS_WEB_RESULT: ${{ needs.tests-web.result }}
          TESTS_MARKETING_RESULT: ${{ needs.tests-marketing.result }}
          TESTS_PACKAGES_RESULT: ${{ needs.tests-packages.result }}
          TESTS_CONVEX_RESULT: ${{ needs.tests-convex.result }}
          STORYBOOK_RESULT: ${{ needs.storybook-ui-web.result }}
          COVERAGE_RESULT: ${{ needs.coverage-ui-web.result }}
          WEB_E2E_SMOKE_RESULT: ${{ needs.web-e2e-smoke.result }}
          WEB_E2E_RESULT: ${{ needs.web-e2e.result }}
        run: bash scripts/ci-verify-required.sh
