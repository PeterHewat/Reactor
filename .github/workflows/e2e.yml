name: E2E

# Manual Playwright or reusable from release.yml. See docs/ci-cd.md#e2e-tests-playwright

on:
  workflow_dispatch:
    inputs:
      run_web:
        description: Run @repo/web Playwright suite
        required: true
        default: true
        type: boolean
      run_marketing:
        description: Run @repo/marketing Playwright suite
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout (defaults to caller ref)
        required: false
        type: string
      run_web:
        description: Run @repo/web Playwright suite
        required: false
        type: boolean
        default: true
      run_marketing:
        description: Run @repo/marketing Playwright suite
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"

jobs:
  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    if: inputs.run_web
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-bun
      - name: Resolve E2E mode
        id: e2e
        run: |
          set -euo pipefail
          missing=()
          [ -z "${{ secrets.CLERK_SECRET_KEY }}" ] && missing+=("CLERK_SECRET_KEY")
          [ -z "${{ secrets.E2E_CLERK_USER_EMAIL }}" ] && missing+=("E2E_CLERK_USER_EMAIL")
          [ -z "${{ secrets.VITE_CONVEX_URL }}" ] && missing+=("VITE_CONVEX_URL")
          [ -z "${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" ] && missing+=("VITE_CLERK_PUBLISHABLE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ui_only=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Missing E2E secrets (${missing[*]}). Running UI-only Playwright (home, routing)."
          else
            echo "ui_only=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Codegen, install browsers, and run Playwright (web)
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          PLAYWRIGHT_UI_ONLY: ${{ steps.e2e.outputs.ui_only == 'true' && '1' || '0' }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ "${{ steps.e2e.outputs.ui_only }}" = "true" ]; then
            export VITE_CONVEX_URL="${VITE_CONVEX_URL:-https://test-project.convex.cloud}"
            bunx playwright install chromium
            bun run --filter @repo/web e2e
            exit 0
          fi
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::Full web E2E (tasks) requires CONVEX_DEPLOY_KEY for convex/_generated. See docs/ci-cd.md#repository-secrets"
            exit 1
          fi
          bun scripts/generate-convex.ts
          bunx playwright install chromium
          bun run --filter @repo/web e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web
          path: apps/web/playwright-report/
          retention-days: 7

  marketing-e2e:
    name: Marketing E2E
    runs-on: ubuntu-latest
    if: inputs.run_marketing
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: ./.github/actions/setup-bun
      - name: Install Playwright browsers
        run: bunx playwright install chromium
      - name: Run Playwright tests (marketing)
        run: bun run --filter @repo/marketing e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-marketing
          path: apps/marketing/playwright-report/
          retention-days: 7
