# Deploy a release tag to production (Vercel / Convex).
# Quality gates run in ci.yml on main/PRs — deploy only builds and ships.
#
# USAGE: Actions → Deploy → Run workflow → tag e.g. web-v1.0.0
#
# REQUIRED GITHUB SECRETS: see docs/ci-cd.md

name: Deploy

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. web-v1.0.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy or rollback (e.g. web-v1.0.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"

jobs:
  parse-release:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.parse.outputs.target }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          TAG="${{ inputs.tag || github.event.inputs.tag }}"
          echo "Parsing tag: $TAG"
          if [[ "$TAG" =~ ^(web|marketing|convex)-v(.+)$ ]]; then
            echo "target=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "Invalid tag format. Expected: {web|marketing|convex}-v{version}"
            exit 1
          fi

  release-convex:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'convex'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex deploy --cmd 'bun run build'

  release-web:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate and deploy to Vercel (web)
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::CONVEX_DEPLOY_KEY is required for web deploy (convex/_generated is not committed)."
            exit 1
          fi
          bun run generate:routes
          bun run generate:convex
          cd apps/web
          bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          bunx vercel build --prod --token="$VERCEL_TOKEN"
          bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build-${{ needs.parse-release.outputs.version }}
          path: apps/web/dist/
          retention-days: 30

  release-marketing:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'marketing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.parse-release.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy to Vercel (marketing)
        working-directory: apps/marketing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
        run: |
          bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          bunx vercel build --prod --token="$VERCEL_TOKEN"
          bunx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: marketing-build-${{ needs.parse-release.outputs.version }}
          path: apps/marketing/dist/
          retention-days: 30
