name: Continuous Integration

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  GITLEAKS_VERSION: "8.30.1"
  CONVEX_CI_TESTS: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      marketing: ${{ steps.detect.outputs.marketing }}
      convex: ${{ steps.detect.outputs.convex }}
      shared: ${{ steps.detect.outputs.shared }}
      config: ${{ steps.detect.outputs.config }}
      any: ${{ steps.detect.outputs.any }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      convex_ci_tests: ${{ steps.ci-flags.outputs.convex_ci_tests }}
    steps:
      - id: ci-flags
        run: echo "convex_ci_tests=${{ env.CONVEX_CI_TESTS }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "")
          elif [ "${{ github.event_name }}" = "push" ]; then
            export CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          bash scripts/ci-detect-changes.sh

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run security audit
        run: bun audit --audit-level=high

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.before }}..${{ github.event.after }}"
          else
            gitleaks detect --source . --redact --verbose
          fi

  quality:
    name: Lint, format & typecheck
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.any == 'true' ||
      needs.detect-changes.outputs.docs_only == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Format, lint, and typecheck
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          ANY_CHANGED: ${{ needs.detect-changes.outputs.any }}
        run: |
          set -euo pipefail
          bun run format
          if [ "${ANY_CHANGED}" != "true" ]; then
            exit 0
          fi
          bun run lint
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run typecheck
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping typecheck — CONVEX_DEPLOY_KEY not set. See docs/ci-cd.md#github-actions-secrets"
          fi

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate and build web app
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          VITE_CONVEX_URL: https://ci-placeholder.convex.cloud
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run --filter @repo/web build
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping web build — CONVEX_DEPLOY_KEY not set. See docs/ci-cd.md#github-actions-secrets"
          fi

  build-marketing:
    name: Build Marketing
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build marketing site
        run: bun run --filter @repo/marketing build

  tests-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, quality, build-web]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run web tests
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          bun scripts/generate-routes.ts
          if [ -n "${CONVEX_DEPLOY_KEY:-}" ]; then
            bun scripts/generate-convex.ts
            bun run --filter @repo/web test:coverage
          elif [ "${{ vars.CI_STRICT }}" = "1" ]; then
            echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
            exit 1
          else
            echo "::notice::Skipping @repo/web tests — CONVEX_DEPLOY_KEY not set. See docs/ci-cd.md#github-actions-secrets"
          fi
          bun run --filter @repo/ui-web test:coverage
          bun run --filter @repo/utils test:coverage
          bun run --filter @repo/utils test:integration

  tests-packages:
    name: Package Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: |
      needs.detect-changes.outputs.shared == 'true' ||
      needs.detect-changes.outputs.config == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run shared package tests
        run: bun run --filter @repo/config test:coverage && bun run --filter @repo/env-core test:coverage

  tests-marketing:
    name: Marketing Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, quality, build-marketing]
    if: needs.detect-changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run marketing tests
        run: bun run --filter @repo/marketing test:coverage

  tests-convex:
    name: Convex Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: needs.detect-changes.outputs.convex == 'true' && needs.detect-changes.outputs.convex_ci_tests == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Convex tests
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            if [ "${{ vars.CI_STRICT }}" = "1" ]; then
              echo "::error::CI_STRICT=1 but CONVEX_DEPLOY_KEY is not configured."
              exit 1
            fi
            echo "::notice::Skipping Convex tests — CONVEX_DEPLOY_KEY not set. See docs/ci-cd.md#github-actions-secrets"
            exit 0
          fi
          bun scripts/generate-convex.ts
          bun run --filter @repo/convex test:coverage

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - security-audit
      - secrets-scan
      - quality
      - build-web
      - build-marketing
      - tests-web
      - tests-marketing
      - tests-packages
      - tests-convex
    if: always() && !cancelled() && needs.detect-changes.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Verify required jobs
        env:
          ANY: ${{ needs.detect-changes.outputs.any }}
          WEB: ${{ needs.detect-changes.outputs.web }}
          MARKETING: ${{ needs.detect-changes.outputs.marketing }}
          CONVEX: ${{ needs.detect-changes.outputs.convex }}
          SHARED: ${{ needs.detect-changes.outputs.shared }}
          CONFIG: ${{ needs.detect-changes.outputs.config }}
          DOCS_ONLY: ${{ needs.detect-changes.outputs.docs_only }}
          CONVEX_CI_TESTS: ${{ needs.detect-changes.outputs.convex_ci_tests }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
          SECRETS_SCAN_RESULT: ${{ needs.secrets-scan.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          BUILD_MARKETING_RESULT: ${{ needs.build-marketing.result }}
          TESTS_WEB_RESULT: ${{ needs.tests-web.result }}
          TESTS_MARKETING_RESULT: ${{ needs.tests-marketing.result }}
          TESTS_PACKAGES_RESULT: ${{ needs.tests-packages.result }}
          TESTS_CONVEX_RESULT: ${{ needs.tests-convex.result }}
        run: bash scripts/ci-verify-required.sh
