name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"
  GITLEAKS_VERSION: "8.30.1"
  CONVEX_CI_TESTS: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.detect.outputs.web }}
      marketing: ${{ steps.detect.outputs.marketing }}
      convex: ${{ steps.detect.outputs.convex }}
      shared: ${{ steps.detect.outputs.shared }}
      any: ${{ steps.detect.outputs.any }}
      convex_ci_tests: ${{ steps.ci-flags.outputs.convex_ci_tests }}
    steps:
      - id: ci-flags
        run: echo "convex_ci_tests=${{ env.CONVEX_CI_TESTS }}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "")
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null || echo "")
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          web=false
          marketing=false
          convex=false
          shared=false
          config=false

          for file in $CHANGED_FILES; do
            if [[ $file == apps/web/* ]]; then web=true; fi
            if [[ $file == apps/marketing/* ]]; then marketing=true; fi
            if [[ $file == convex/* ]]; then convex=true; fi
            if [[ $file == packages/ui-web/* ]]; then shared=true; fi
            if [[ $file == packages/utils/* ]]; then shared=true; fi
            if [[ $file == packages/test-utils/* ]]; then shared=true; fi
            if [[ $file == package.json ]] || [[ $file == bun.lock ]] || [[ $file == eslint.config.js ]] || [[ $file == tsconfig.json ]] || [[ $file == tsconfig.* ]] || [[ $file == .github/workflows/* ]]; then
              config=true
            fi
          done

          if [ "$shared" = "true" ] || [ "$config" = "true" ]; then
            web=true
            marketing=true
            convex=true
          fi

          any=false
          if [ "$web" = "true" ] || [ "$marketing" = "true" ] || [ "$convex" = "true" ]; then
            any=true
          fi

          echo "Detected changes: web=$web, marketing=$marketing, convex=$convex, shared=$shared, config=$config, any=$any"
          echo "web=$web" >> $GITHUB_OUTPUT
          echo "marketing=$marketing" >> $GITHUB_OUTPUT
          echo "convex=$convex" >> $GITHUB_OUTPUT
          echo "shared=$shared" >> $GITHUB_OUTPUT
          echo "any=$any" >> $GITHUB_OUTPUT

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run security audit
        run: bun audit --audit-level=high

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --log-opts="${{ github.event.before }}..${{ github.event.after }}"
          else
            gitleaks detect --source . --redact --verbose
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck

  tests-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run web tests
        run: |
          bun run --filter @repo/web test
          bun run --filter @repo/ui-web test
          bun run --filter @repo/utils test

  tests-marketing:
    name: Marketing Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.marketing == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run marketing tests
        run: bun run --filter @repo/marketing test

  tests-convex:
    name: Convex Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, format, typecheck]
    if: needs.detect-changes.outputs.convex == 'true' && needs.detect-changes.outputs.convex_ci_tests == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Convex tests
        run: bun run --filter @repo/convex test

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-web]
    if: |
      needs.detect-changes.outputs.web == 'true' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bun run e2e:install
      - name: Run Playwright tests (web)
        run: bun run --filter @repo/web e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-web
          path: apps/web/playwright-report/
          retention-days: 7

  marketing-e2e:
    name: Marketing E2E
    runs-on: ubuntu-latest
    needs: [detect-changes, tests-marketing]
    if: |
      needs.detect-changes.outputs.marketing == 'true' && (
        github.ref == 'refs/heads/main' ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e'))
      )
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bun run e2e:install
      - name: Run Playwright tests (marketing)
        run: bun run --filter @repo/marketing e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-marketing
          path: apps/marketing/playwright-report/
          retention-days: 7
