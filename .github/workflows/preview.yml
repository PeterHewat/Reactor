name: Deploy Preview

# Manual preview deploys (Convex + Vercel). Checkout ref = branch selected in
# "Use workflow from". See docs/ci-cd.md#deploy-preview

on:
  workflow_dispatch:
    inputs:
      deploy_convex:
        description: Deploy Convex preview
        required: true
        default: true
        type: boolean
      deploy_web:
        description: Deploy web app to Vercel preview
        required: true
        default: true
        type: boolean
      deploy_marketing:
        description: Deploy marketing site to Vercel preview
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-manual-${{ github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24"

jobs:
  resolve-context:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      preview_name: ${{ steps.meta.outputs.preview_name }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Set Convex preview deployment name
        id: meta
        run: |
          set -euo pipefail
          slug=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g' | sed 's/^-*//;s/-*$//' | cut -c1-48)
          name="manual-${slug:-run}"
          echo "preview_name=$name" >> "$GITHUB_OUTPUT"
          echo "Branch: ${{ github.ref_name }} → Convex preview \`$name\`"
      - name: Find open pull request for this branch
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.ref.replace(/^refs\/heads\//, "");
            const { owner, repo } = context.repo;
            const { data: open } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const matches = open.filter((pr) => pr.head.ref === branch);
            if (matches.length === 1) {
              core.setOutput("number", String(matches[0].number));
              core.info(`Open PR #${matches[0].number} for branch ${branch}`);
            } else if (matches.length > 1) {
              core.warning(
                `Multiple open PRs use branch ${branch}; skipping PR comment.`,
              );
              core.setOutput("number", "");
            } else {
              core.info(`No open PR for branch ${branch}; summary only.`);
              core.setOutput("number", "");
            }

  preview-convex:
    name: Convex preview
    runs-on: ubuntu-latest
    needs: resolve-context
    if: inputs.deploy_convex
    outputs:
      convex_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy Convex preview
        id: deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CONVEX_DEPLOY_KEY:-}" ]; then
            echo "::error::CONVEX_PREVIEW_DEPLOY_KEY is required for Convex previews."
            exit 1
          fi
          bunx convex deploy --preview-create "${{ needs.resolve-context.outputs.preview_name }}"
          URL="${CONVEX_URL:-}"
          if [ -z "$URL" ] && [ -f .env.local ]; then
            URL=$(grep -E '^CONVEX_URL=' .env.local | head -n1 | cut -d= -f2- | tr -d '"' | tr -d "'")
          fi
          if [ -z "$URL" ]; then
            echo "::error::Convex preview deploy did not produce CONVEX_URL (check CLI output and .env.local)."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  preview-web:
    name: Web preview (Vercel)
    runs-on: ubuntu-latest
    needs: [resolve-context, preview-convex]
    if: |
      always() &&
      inputs.deploy_web &&
      (needs.preview-convex.result == 'success' || needs.preview-convex.result == 'skipped')
    outputs:
      vercel_url: ${{ steps.vercel.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate and deploy to Vercel (web preview)
        id: vercel
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_PREVIEW_DEPLOY_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          VITE_CONVEX_URL: ${{ inputs.deploy_convex && needs.preview-convex.outputs.convex_url || secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_CONVEX_URL:-}" ]; then
            echo "::error::Web preview needs a Convex URL — enable deploy_convex or set VITE_CONVEX_URL in Actions secrets."
            exit 1
          fi
          bun scripts/generate-routes.ts
          bun scripts/generate-convex.ts
          cd apps/web
          bunx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          bunx vercel build --token="$VERCEL_TOKEN"
          URL=$(bunx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"

  preview-marketing:
    name: Marketing preview (Vercel)
    runs-on: ubuntu-latest
    needs: resolve-context
    if: inputs.deploy_marketing
    outputs:
      vercel_url: ${{ steps.vercel.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy to Vercel (marketing preview)
        id: vercel
        working-directory: apps/marketing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
        run: |
          bunx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          bunx vercel build --token="$VERCEL_TOKEN"
          URL=$(bunx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview-url=$URL" >> "$GITHUB_OUTPUT"

  preview-summary:
    name: Preview summary
    runs-on: ubuntu-latest
    needs: [resolve-context, preview-convex, preview-web, preview-marketing]
    if: always()
    steps:
      - name: Write job summary
        env:
          REF_NAME: ${{ github.ref_name }}
          PREVIEW_NAME: ${{ needs.resolve-context.outputs.preview_name }}
          PR_NUMBER: ${{ needs.resolve-context.outputs.pr_number }}
          CONVEX_URL: ${{ needs.preview-convex.outputs.convex_url }}
          WEB_URL: ${{ needs.preview-web.outputs.vercel_url }}
          MARKETING_URL: ${{ needs.preview-marketing.outputs.vercel_url }}
          CONVEX_RESULT: ${{ needs.preview-convex.result }}
          WEB_RESULT: ${{ needs.preview-web.result }}
          MARKETING_RESULT: ${{ needs.preview-marketing.result }}
          DEPLOY_CONVEX: ${{ inputs.deploy_convex }}
          DEPLOY_WEB: ${{ inputs.deploy_web }}
          DEPLOY_MARKETING: ${{ inputs.deploy_marketing }}
        run: |
          {
            echo "## Deploy Preview"
            echo ""
            echo "- **Branch:** \`$REF_NAME\` (\`${{ github.ref }}\`)"
            echo "- **Convex preview name:** \`$PREVIEW_NAME\`"
            if [ -n "$PR_NUMBER" ]; then
              echo "- **PR:** #$PR_NUMBER (comment updated when deploy succeeded)"
            fi
            echo ""
            if [ "$DEPLOY_CONVEX" = "true" ]; then
              if [ "$CONVEX_RESULT" = "success" ] && [ -n "$CONVEX_URL" ]; then
                echo "### Convex"
                echo "- $CONVEX_URL"
              else
                echo "### Convex"
                echo "- Failed or skipped (see job logs)"
              fi
              echo ""
            fi
            if [ "$DEPLOY_WEB" = "true" ]; then
              if [ "$WEB_RESULT" = "success" ] && [ -n "$WEB_URL" ]; then
                echo "### Web (Vercel)"
                echo "- $WEB_URL"
              else
                echo "### Web (Vercel)"
                echo "- Failed or skipped (see job logs)"
              fi
              echo ""
            fi
            if [ "$DEPLOY_MARKETING" = "true" ]; then
              if [ "$MARKETING_RESULT" = "success" ] && [ -n "$MARKETING_URL" ]; then
                echo "### Marketing (Vercel)"
                echo "- $MARKETING_URL"
              else
                echo "### Marketing (Vercel)"
                echo "- Failed or skipped (see job logs)"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: needs.resolve-context.outputs.pr_number != ''
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ needs.resolve-context.outputs.pr_number }}
          REF_NAME: ${{ github.ref_name }}
          PREVIEW_NAME: ${{ needs.resolve-context.outputs.preview_name }}
          CONVEX_URL: ${{ needs.preview-convex.outputs.convex_url }}
          WEB_URL: ${{ needs.preview-web.outputs.vercel_url }}
          MARKETING_URL: ${{ needs.preview-marketing.outputs.vercel_url }}
          CONVEX_RESULT: ${{ needs.preview-convex.result }}
          WEB_RESULT: ${{ needs.preview-web.result }}
          MARKETING_RESULT: ${{ needs.preview-marketing.result }}
          DEPLOY_CONVEX: ${{ inputs.deploy_convex }}
          DEPLOY_WEB: ${{ inputs.deploy_web }}
          DEPLOY_MARKETING: ${{ inputs.deploy_marketing }}
        with:
          script: |
            const lines = [
              "## Deploy Preview",
              "",
              `Manual run on branch \`${process.env.REF_NAME}\` (Convex preview \`${process.env.PREVIEW_NAME}\`).`,
              "",
            ];

            if (process.env.DEPLOY_CONVEX === "true") {
              if (process.env.CONVEX_RESULT === "success" && process.env.CONVEX_URL) {
                lines.push("### Convex", `- ${process.env.CONVEX_URL}`, "");
              } else {
                lines.push("### Convex", "- Failed — check workflow logs", "");
              }
            }

            if (process.env.DEPLOY_WEB === "true") {
              if (process.env.WEB_RESULT === "success" && process.env.WEB_URL) {
                lines.push("### Web (Vercel)", `- ${process.env.WEB_URL}`, "");
              } else {
                lines.push("### Web (Vercel)", "- Failed — check workflow logs", "");
              }
            }

            if (process.env.DEPLOY_MARKETING === "true") {
              if (
                process.env.MARKETING_RESULT === "success" &&
                process.env.MARKETING_URL
              ) {
                lines.push(
                  "### Marketing (Vercel)",
                  `- ${process.env.MARKETING_URL}`,
                  "",
                );
              } else {
                lines.push(
                  "### Marketing (Vercel)",
                  "- Failed — check workflow logs",
                  "",
                );
              }
            }

            const marker = "<!-- preview-deployments -->";
            const body = `${marker}\n${lines.join("\n")}`;
            const prNumber = Number(process.env.PR_NUMBER);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
