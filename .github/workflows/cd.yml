name: Continuous Delivery

# ============================================================================
# REQUIRED GITHUB SECRETS
# ============================================================================
# CONVEX_DEPLOY_KEY              - Convex production deploy key (convex-v* releases)
# CONVEX_PREVIEW_DEPLOY_KEY        - Convex preview deploy key (PR preview label; see preview.yml)
# VITE_CONVEX_URL                - Convex URL baked into web build
# VITE_CLERK_PUBLISHABLE_KEY     - Clerk publishable key baked into web build
# VERCEL_TOKEN                   - Vercel API token (web + marketing deploys)
# VERCEL_ORG_ID                  - Vercel team/user ID
# VERCEL_WEB_PROJECT_ID          - Vercel project linked to apps/web
# VERCEL_MARKETING_PROJECT_ID    - Vercel project linked to apps/marketing
#
# See docs/ci-cd.md for how to obtain these values.
# ============================================================================

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUN_VERSION: "1.3.13"

jobs:
  parse-release:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.parse.outputs.target }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          echo "Parsing tag: $TAG"
          if [[ "$TAG" =~ ^(web|marketing|convex)-v(.+)$ ]]; then
            echo "target=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "version=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
          else
            echo "Invalid tag format. Expected: {web|marketing|convex}-v{version}"
            exit 1
          fi

  release-convex:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'convex'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Run checks
        run: |
          bun run lint
          bun run format
          bun run typecheck
      - name: Deploy to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex deploy --cmd 'bun run build'

  release-web:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Run checks
        run: |
          bun run lint
          bun run format
          bun run typecheck
          bun run test
      - name: Build web app
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: bun run --filter @repo/web build
      - name: Deploy to Vercel (web)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: "--prod"
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build-${{ needs.parse-release.outputs.version }}
          path: apps/web/dist/
          retention-days: 30

  release-marketing:
    needs: parse-release
    if: needs.parse-release.outputs.target == 'marketing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Run checks
        run: |
          bun run lint
          bun run format
          bun run typecheck
          bun run --filter @repo/marketing test
      - name: Build marketing site
        run: bun run --filter @repo/marketing build
      - name: Deploy to Vercel (marketing)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_MARKETING_PROJECT_ID }}
          working-directory: apps/marketing
          vercel-args: "--prod"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: marketing-build-${{ needs.parse-release.outputs.version }}
          path: apps/marketing/dist/
          retention-days: 30
